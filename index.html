<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SKY MEMORIES - RTAF Museum</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Sarabun', sans-serif;
    }

    body {
      background-color: #1a2536;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }

    .page {
      display: none;
      width: 100%;
      max-width: 500px;
      animation: fadeIn 0.4s ease;
    }

    .page.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---------------- 1. หน้าแรก (Main Menu) ---------------- */
    .menu-card {
      width: 100%;
      background: linear-gradient(135deg, #2b4c7e 0%, #1a2536 100%);
      border: 3px solid #64dfdf;
      border-radius: 20px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      color: white;
    }

    .menu-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #72efdd;
      margin-bottom: 5px;
      text-shadow: 0 2px 10px rgba(114, 239, 221, 0.3);
    }

    .menu-subtitle {
      font-size: 14px;
      color: #e0e1dd;
      margin-bottom: 25px;
    }

    .menu-btn-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
    }

    .btn-main {
      background: linear-gradient(90deg, #48cae4 0%, #0077b6 100%);
      color: white;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 119, 182, 0.4);
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }

    .btn-main:active {
      transform: scale(0.98);
    }

    .btn-map {
      background: linear-gradient(90deg, #72efdd 0%, #48cae4 100%);
      color: #1a2536;
    }

    /* ---------------- 2. หน้าแสตมป์ (Passport) ---------------- */
    .card-wrapper {
      position: relative;
      width: 100%;
      background-image: url('bg-card.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      aspect-ratio: 1.5 / 1;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .stamp-container {
      position: absolute;
      top: 18%;
      left: 4%;
      width: 44%;
      height: 52%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      align-items: center;
      justify-items: center;
    }

    .stamp-slot {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .stamp-mark {
      display: none;
      width: 80%;
      height: 80%;
      background: #e63946;
      color: white;
      border-radius: 50%;
      font-size: 10px;
      font-weight: bold;
      justify-content: center;
      align-items: center;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      text-align: center;
    }

    .stamp-slot.unlocked .stamp-mark {
      display: flex;
      animation: stamp-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes stamp-pop {
      0% { transform: scale(2.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .input-name {
      position: absolute;
      top: 17%;
      left: 61%;
      width: 32%;
      height: 8%;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: bold;
      color: #1d3557;
      outline: none;
    }

    .input-impression {
      position: absolute;
      top: 73%;
      left: 8%;
      width: 40%;
      height: 20%;
      border: none;
      background: transparent;
      font-size: 11px;
      color: #1d3557;
      resize: none;
      outline: none;
      line-height: 1.3;
    }

    /* ---------------- 3. หน้าเปิดแผนที่ ---------------- */
    .map-card {
      width: 100%;
      background: white;
      border-radius: 16px;
      padding: 25px 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .nav-back-btn {
      margin-top: 15px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- ================= PAGE 1: หน้าแรก (MAIN MENU) ================= -->
  <div id="page-menu" class="page active">
    <div class="menu-card">
      <div class="menu-title">SKY MEMORIES</div>
      <div class="menu-subtitle">พิพิธภัณฑ์กองทัพอากาศและการบินแห่งชาติ</div>
      
      <div class="menu-btn-group">
        <button class="btn-main" onclick="switchPage('page-stamp')">
          🎟️ การ์ดสะสมแสตมป์ (Passport)
        </button>
        <button class="btn-main btn-map" onclick="switchPage('page-map')">
          🗺️ แผนที่จุดกิจกรรม (Interactive Map)
        </button>
      </div>
    </div>
  </div>

  <!-- ================= PAGE 2: หน้าการ์ดแสตมป์ (STAMP CARD) ================= -->
  <div id="page-stamp" class="page">
    <div class="card-wrapper">
      <div class="stamp-container">
        <div class="stamp-slot" id="slot-1"><div class="stamp-mark">✔ ปั๊มแล้ว</div></div>
        <div class="stamp-slot" id="slot-2"><div class="stamp-mark">✔ ปั๊มแล้ว</div></div>
        <div class="stamp-slot" id="slot-3"><div class="stamp-mark">✔ ปั๊มแล้ว</div></div>
        <div class="stamp-slot" id="slot-4"><div class="stamp-mark">✔ ปั๊มแล้ว</div></div>
        <div class="stamp-slot" id="slot-5"><div class="stamp-mark">✔ ปั๊มแล้ว</div></div>
      </div>

      <input type="text" id="userName" class="input-name" placeholder="พิมพ์ชื่อ..." oninput="saveUserData()">
      <textarea id="userImpression" class="input-impression" placeholder="พิมพ์ความประทับใจ..." oninput="saveUserData()"></textarea>
    </div>

    <button class="nav-back-btn" onclick="switchPage('page-menu')">🏠 กลับหน้าหลัก</button>
  </div>

  <!-- ================= PAGE 3: หน้ากดเปิดแผนที่ CANVA ================= -->
  <div id="page-map" class="page">
    <div class="map-card">
      <h3 style="color: #1d3557; margin-bottom: 8px; font-size: 18px;">🗺️ แผนที่ผังพิพิธภัณฑ์</h3>
      <p style="font-size: 13px; color: #6c757d; margin-bottom: 20px;">กดปุ่มด้านล่างเพื่อเปิดดูแผนที่และจุดสะสมแสตมป์แบบเต็มหน้าจอ</p>
      
      <!-- ปุ่มลิงก์ตรงไปยัง Canva Map -->
      <a href="https://rtaf-museum.my.canva.site/map-rtaf-museum/" target="_blank" class="btn-main" style="background: linear-gradient(90deg, #2a9d8f 0%, #264653 100%);">
        📌 เปิดแผนที่ผังพิพิธภัณฑ์ (Canva Map)
      </a>
    </div>

    <button class="nav-back-btn" onclick="switchPage('page-menu')">🏠 กลับหน้าหลัก</button>
  </div>

  <script>
    function switchPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }

    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const stampId = urlParams.get('stamp');

      if (stampId && stampId >= 1 && stampId <= 5) {
        localStorage.setItem('stamp_' + stampId, 'unlocked');
        window.history.replaceState({}, document.title, window.location.pathname);
        switchPage('page-stamp');
      }

      renderStamps();
      loadUserData();
    };

    function renderStamps() {
      for (let i = 1; i <= 5; i++) {
        const isUnlocked = localStorage.getItem('stamp_' + i) === 'unlocked';
        const slot = document.getElementById('slot-' + i);

        if (isUnlocked) {
          slot.classList.add('unlocked');
        }
      }
    }

    function saveUserData() {
      localStorage.setItem('user_name', document.getElementById('userName').value);
      localStorage.setItem('user_impression', document.getElementById('userImpression').value);
    }

    function loadUserData() {
      if(localStorage.getItem('user_name')) {
        document.getElementById('userName').value = localStorage.getItem('user_name');
      }
      if(localStorage.getItem('user_impression')) {
        document.getElementById('userImpression').value = localStorage.getItem('user_impression');
      }
    }
  </script>
</body>
</html>
