<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SKY MEMORIES - RTAF Museum</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Sarabun', sans-serif;
    }

    body {
      background-color: #1a2536;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }

    /* กรอบหลักที่ดึงภาพ bg-card.png มาแสดง */
    .card-wrapper {
      position: relative;
      width: 100%;
      max-width: 500px;
      /* ดึงไฟล์รูป bg-card.png ที่คุณอัปโหลดมาเป็นฉากหลัง */
      background-image: url('bg-card.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      aspect-ratio: 1.5 / 1; /* อัตราส่วนการ์ดแนวนอน */
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* ---------------- โซนช่องแสตมป์ 5 จุด (โปร่งใส) ---------------- */
    .stamp-container {
      position: absolute;
      top: 18%;
      left: 4%;
      width: 44%;
      height: 52%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      align-items: center;
      justify-items: center;
    }

    /* ปรับตำแหน่งช่องแสตมป์ให้ตรงกับรูปการ์ดเดิม */
    .stamp-slot {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent; /* ตัดภาพแสตมป์เทาออก ให้ใสเป็นช่องว่าง */
    }

    /* ตราประทับตอนสแกนสำเร็จ */
    .stamp-mark {
      display: none; /* ซ่อนไว้ก่อนสแกน */
      width: 80%;
      height: 80%;
      background: #e63946;
      color: white;
      border-radius: 50%;
      font-size: 10px;
      font-weight: bold;
      justify-content: center;
      align-items: center;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      text-align: center;
    }

    /* เมื่อปลดล็อกแล้ว ให้แสดงตราปั๊ม */
    .stamp-slot.unlocked .stamp-mark {
      display: flex;
      animation: stamp-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes stamp-pop {
      0% { transform: scale(2.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ---------------- โซนกรอกข้อมูลบนภาพ ---------------- */
    /* ช่องกรอกชื่อ */
    .input-name {
      position: absolute;
      top: 17%;
      left: 61%;
      width: 32%;
      height: 8%;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: bold;
      color: #1d3557;
      outline: none;
    }

    /* ช่องพิมพ์ความประทับใจ */
    .input-impression {
      position: absolute;
      top: 73%;
      left: 8%;
      width: 40%;
      height: 20%;
      border: none;
      background: transparent;
      font-size: 11px;
      color: #1d3557;
      resize: none;
      outline: none;
      line-height: 1.3;
    }

    .reset-btn {
      margin-top: 15px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card-wrapper">
    <!-- ช่องแสตมป์ 5 จุด -->
    <div class="stamp-container">
      <div class="stamp-slot" id="slot-1"><div class="stamp-mark">✔ ปั๊มแล้ว</div></div>
      <div class="stamp-slot" id="slot-2"><div class="stamp-mark">✔ ปั๊มแล้ว</div></div>
      <div class="stamp-slot" id="slot-3"><div class="stamp-mark">✔ ปั๊มแล้ว</div></div>
      <div class="stamp-slot" id="slot-4"><div class="stamp-mark">✔ ปั๊มแล้ว</div></div>
      <div class="stamp-slot" id="slot-5"><div class="stamp-mark">✔ ปั๊มแล้ว</div></div>
    </div>

    <!-- ช่องกรอกชื่อ -->
    <input type="text" id="userName" class="input-name" placeholder="พิมพ์ชื่อ..." oninput="saveUserData()">

    <!-- ช่องกรอกความประทับใจ -->
    <textarea id="userImpression" class="input-impression" placeholder="พิมพ์ความประทับใจ..." oninput="saveUserData()"></textarea>
  </div>

  <button class="reset-btn" onclick="resetStamps()">🔄 รีเซ็ตแสตมป์ (เพื่อทดสอบ)</button>

  <script>
    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const stampId = urlParams.get('stamp');

      if (stampId && stampId >= 1 && stampId <= 5) {
        localStorage.setItem('stamp_' + stampId, 'unlocked');
        window.history.replaceState({}, document.title, window.location.pathname);
      }

      renderStamps();
      loadUserData();
    };

    function renderStamps() {
      for (let i = 1; i <= 5; i++) {
        const isUnlocked = localStorage.getItem('stamp_' + i) === 'unlocked';
        const slot = document.getElementById('slot-' + i);

        if (isUnlocked) {
          slot.classList.add('unlocked');
        }
      }
    }

    function saveUserData() {
      localStorage.setItem('user_name', document.getElementById('userName').value);
      localStorage.setItem('user_impression', document.getElementById('userImpression').value);
    }

    function loadUserData() {
      if(localStorage.getItem('user_name')) {
        document.getElementById('userName').value = localStorage.getItem('user_name');
      }
      if(localStorage.getItem('user_impression')) {
        document.getElementById('userImpression').value = localStorage.getItem('user_impression');
      }
    }

    function resetStamps() {
      if(confirm("ต้องการรีเซ็ตแสตมป์ทั้งหมดใช่ไหม?")) {
        localStorage.clear();
        location.reload();
      }
    }
  </script>
</body>
</html>
