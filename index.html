<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SKY MEMORIES - RTAF Museum</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Sarabun', 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      background-color: #1a2536;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }

    /* ระบบจัดการการสลับหน้า */
    .page {
      display: none;
      width: 100%;
      max-width: 550px; /* ขนาดความกว้างหน้าเว็บ */
      animation: fadeIn 0.4s ease;
    }

    .page.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---------------- 1. หน้าแรก (MAIN MENU) ---------------- */
    .menu-card {
      width: 100%;
      background: linear-gradient(135deg, #2b4c7e 0%, #1a2536 100%);
      border: 3px solid #64dfdf;
      border-radius: 20px;
      padding: 35px 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      color: white;
    }

    .menu-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #72efdd;
      margin-bottom: 5px;
      text-shadow: 0 2px 10px rgba(114, 239, 221, 0.3);
    }

    .menu-subtitle {
      font-size: 14px;
      color: #e0e1dd;
      margin-bottom: 30px;
    }

    .menu-btn-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
    }

    .btn-main {
      background: linear-gradient(90deg, #48cae4 0%, #0077b6 100%);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 119, 182, 0.4);
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }

    .btn-main:active {
      transform: scale(0.98);
    }

    .btn-map {
      background: linear-gradient(90deg, #72efdd 0%, #48cae4 100%);
      color: #1a2536;
      box-shadow: 0 4px 15px rgba(114, 239, 221, 0.3);
    }

    /* ---------------- 2. หน้าการ์ดแสตมป์ (PASSPORT) ---------------- */
    .card-wrapper {
      position: relative;
      width: 100%;
      background-image: url('bg-card.png'); /* เรียกใช้ไฟล์ bg-card.png บน GitHub */
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      aspect-ratio: 1.83 / 1;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* วางตำแหน่งช่องแสตมป์แบบ Absolute ตรงตามช่องสีขาวบนการ์ด */
    .stamp-slot {
      position: absolute;
      width: 15%;  /* ความกว้างตัวแสตมป์ */
      height: 26%; /* ความสูงตัวแสตมป์ */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* พิกัดแต่ละช่องแสตมป์ (ปรับตำแหน่งให้ตรงช่องสีขาว) */
    #slot-1 { top: 16.5%; left: 10.2%; } /* แถวบน - ซ้าย */
    #slot-2 { top: 16.5%; left: 26.2%; } /* แถวบน - ขวา */
    
    #slot-3 { top: 43.5%; left: 4.5%;  } /* แถวล่าง - ซ้าย */
    #slot-4 { top: 43.5%; left: 20.0%; } /* แถวล่าง - กลาง */
    #slot-5 { top: 43.5%; left: 35.5%; } /* แถวล่าง - ขวา */

    /* รูปภาพตราแสตมป์ */
    .stamp-mark {
      display: none;
      width: 100%;
      height: 100%;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      transform: scale(1.05); /* ขยายภาพแสตมป์ให้เต็มช่องยิ่งขึ้น */
      filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.25));
    }

    .stamp-slot.unlocked .stamp-mark {
      display: block;
      animation: stamp-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes stamp-pop {
      0% { transform: scale(2.2); opacity: 0; }
      100% { transform: scale(1.05); opacity: 1; }
    }

    /* ---------------- โซนช่องกรอกข้อความให้ตรงเส้น ---------------- */
    /* ช่องกรอกชื่อ (ตรงเส้น NAME _____) */
    .input-name {
      position: absolute;
      top: 13.5%;
      left: 61.5%;
      width: 28%;
      height: 6%;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: bold;
      color: #1d3557;
      outline: none;
      padding-left: 5px;
    }

    /* ช่องพิมพ์ความประทับใจ (ตรงเส้นบรรทัด 3 เส้นด้านล่าง) */
    .input-impression {
      position: absolute;
      top: 77.2%;           /* จุดเริ่มต้นบรรทัดแรก */
      left: 8.5%;           /* ขอบซ้ายตรงกับเส้น */
      width: 37.5%;         /* ความกว้างสุดเส้น */
      height: 18.5%;        /* ความสูงคลุม 3 บรรทัด */
      border: none;
      background: transparent;
      font-size: 11px;       /* ขนาดตัวหนังสือพอดีช่อง */
      color: #1d3557;
      resize: none;
      outline: none;
      line-height: 1.75;    /* ระยะห่างบรรทัดให้ตรงกับเส้นบนการ์ด */
      padding: 0;
      margin: 0;
      letter-spacing: 0.3px;
    }

    /* ปุ่มนำทาง */
    .nav-back-btn {
      margin-top: 15px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }

    .reset-btn {
      margin-top: 10px;
      background: transparent;
      color: #e63946;
      border: none;
      font-size: 11px;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- ================= PAGE 1: หน้าแรก (MAIN MENU) ================= -->
  <div id="page-menu" class="page active">
    <div class="menu-card">
      <div class="menu-title">SKY MEMORIES</div>
      <div class="menu-subtitle">พิพิธภัณฑ์กองทัพอากาศและการบินแห่งชาติ</div>
      
      <div class="menu-btn-group">
        <button class="btn-main" onclick="switchPage('page-stamp')">
          🎟️ การ์ดสะสมแสตมป์ (Passport)
        </button>
        <button class="btn-main btn-map" onclick="openCanvaMap()">
          🗺️ แผนที่จุดกิจกรรม (Interactive Map)
        </button>
      </div>
    </div>
  </div>

  <!-- ================= PAGE 2: หน้าการ์ดแสตมป์ (PASSPORT) ================= -->
  <div id="page-stamp" class="page">
    <div class="card-wrapper">
      <!-- ช่องวางแสตมป์ 5 จุด (ดึงไฟล์ stamp-1.png ถึง stamp-5.png) -->
      <div class="stamp-slot" id="slot-1"><div class="stamp-mark" style="background-image: url('stamp-1.png');"></div></div>
      <div class="stamp-slot" id="slot-2"><div class="stamp-mark" style="background-image: url('stamp-2.png');"></div></div>
      <div class="stamp-slot" id="slot-3"><div class="stamp-mark" style="background-image: url('stamp-3.png');"></div></div>
      <div class="stamp-slot" id="slot-4"><div class="stamp-mark" style="background-image: url('stamp-4.png');"></div></div>
      <div class="stamp-slot" id="slot-5"><div class="stamp-mark" style="background-image: url('stamp-5.png');"></div></div>

      <!-- ช่องกรอกข้อมูล -->
      <input type="text" id="userName" class="input-name" placeholder="พิมพ์ชื่อ..." oninput="saveUserData()">
      <textarea id="userImpression" class="input-impression" placeholder="พิมพ์ความประทับใจ..." oninput="saveUserData()"></textarea>
    </div>

    <button class="nav-back-btn" onclick="switchPage('page-menu')">🏠 กลับหน้าหลัก</button>
    <button class="reset-btn" onclick="resetStamps()">🔄 รีเซ็ตแสตมป์ทั้งหมด (เพื่อทดสอบ)</button>
  </div>

  <!-- ================= SCRIPT การทำงาน ================= -->
  <script>
    // 1. ฟังก์ชันสลับหน้า
    function switchPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }

    // 2. ฟังก์ชันเปิดแผนที่ Canva ในแท็บใหม่
    function openCanvaMap() {
      window.open('https://rtaf-museum.my.canva.site/map-rtaf-museum/', '_blank');
    }

    // 3. ทำงานอัตโนมัติเมื่อเปิดหน้าเว็บ
    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const stampId = urlParams.get('stamp');

      // ถ้านักท่องเที่ยวสแกน QR Code มา ให้เด้งเข้าหน้าแสตมป์แล้วปั๊มตราทันที
      if (stampId && stampId >= 1 && stampId <= 5) {
        localStorage.setItem('stamp_' + stampId, 'unlocked');
        window.history.replaceState({}, document.title, window.location.pathname);
        switchPage('page-stamp');
      }

      renderStamps();
      loadUserData();
    };

    // 4. แสดงผลตราแสตมป์ที่ปลดล็อกแล้ว
    function renderStamps() {
      for (let i = 1; i <= 5; i++) {
        const isUnlocked = localStorage.getItem('stamp_' + i) === 'unlocked';
        const slot = document.getElementById('slot-' + i);

        if (isUnlocked && slot) {
          slot.classList.add('unlocked');
        }
      }
    }

    // 5. บันทึกและโหลดข้อมูลชื่อ/ความประทับใจ
    function saveUserData() {
      localStorage.setItem('user_name', document.getElementById('userName').value);
      localStorage.setItem('user_impression', document.getElementById('userImpression').value);
    }

    function loadUserData() {
      if(localStorage.getItem('user_name')) {
        document.getElementById('userName').value = localStorage.getItem('user_name');
      }
      if(localStorage.getItem('user_impression')) {
        document.getElementById('userImpression').value = localStorage.getItem('user_impression');
      }
    }

    // 6. ฟังก์ชันรีเซ็ตแสตมป์เพื่อทดสอบ
    function resetStamps() {
      if(confirm("คุณต้องการรีเซ็ตแสตมป์ทั้งหมดเพื่อทดสอบใหม่ใช่ไหม?")) {
        localStorage.clear();
        location.reload();
      }
    }
  </script>
</body>
</html>
